name: Build Mac DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac-intel:
    runs-on: macos-13
    permissions:
      contents: write
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build Mac App
        run: |
          source .venv/bin/activate
          python -m PyInstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --osx-bundle-identifier "com.ulysis.aimonitor" \
            --name "AI余额监控" \
            --add-data "src:src" \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import requests \
            run.py

      - name: Rename and sign
        run: |
          cd dist
          if [ -d "run" ]; then mv "run" "AI余额监控"; fi
          if [ -f "run.app" ]; then mv "run.app" "AI余额监控.app"; elif [ -d "run.app" ]; then mv "run.app" "AI余额监控.app"; fi
          codesign --force --deep --sign - "AI余额监控.app"
          xattr -cr "AI余额监控.app"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          cd dist
          create-dmg \
            --volname "AI余额监控" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AI余额监控.app" 175 190 \
            --hide-extension "AI余额监控.app" \
            --app-drop-link 425 190 \
            "AI余额监控-mac-intel.dmg" \
            "AI余额监控.app" || \
          zip -r "AI余额监控-mac-intel.zip" "AI余额监控.app"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI余额监控-mac-intel
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip

  build-mac-arm64:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
