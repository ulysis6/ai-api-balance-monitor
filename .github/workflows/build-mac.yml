name: Build Mac DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build Mac App
        run: |
          python -m PyInstaller \
            --noconfirm \
            --onedir \
            --windowed \
            --name "AIšĹôťĘĚÁõĎśéß" \
            --add-data "src:src" \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import requests \
            run.py

      - name: Rename executable
        run: |
          cd dist
          if [ -d "run" ]; then
            mv "run" "AIšĹôťĘĚÁõĎśéß"
          fi
          if [ -f "run.app" ]; then
            mv "run.app" "AIšĹôťĘĚÁõĎśéß.app"
          elif [ -d "run.app" ]; then
            mv "run.app" "AIšĹôťĘĚÁõĎśéß.app"
          fi

      - name: Create DMG
        run: |
          brew install create-dmg || true
          cd dist
          create-dmg \
            --volname "AIšĹôťĘĚÁõĎśéß" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AIšĹôťĘĚÁõĎśéß.app" 175 190 \
            --hide-extension "AIšĹôťĘĚÁõĎśéß.app" \
            --app-drop-link 425 190 \
            "AIšĹôťĘĚÁõĎśéß.dmg" \
            "AIšĹôťĘĚÁõĎśéß.app" || \
          zip -r "AIšĹôťĘĚÁõĎśéß-mac.zip" "AIšĹôťĘĚÁõĎśéß.app"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIšĹôťĘĚÁõĎśéß-mac
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
