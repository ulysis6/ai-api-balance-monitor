            --icon-size 100 \
            --icon "AI余额监控.app" 175 190 \
            --hide-extension "AI余额监控.app" \
            --app-drop-link 425 190 \
            "AI余额监控-mac-arm64.dmg" \
            "AI余额监控.app" || \
          zip -r "AI余额监控-mac-arm64.zip" "AI余额监控.app"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
