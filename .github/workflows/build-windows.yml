name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 requests

      - name: Build Windows
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "AIšĹôťĘĚÁõĎśéß" --add-data "src;src" --hidden-import PyQt5 --hidden-import PyQt5.QtWidgets --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import requests src/main.py

      - name: Zip output
        run: |
          Compress-Archive -Path "dist\AIšĹôťĘĚÁõĎśéß" -DestinationPath "dist\AIšĹôťĘĚÁõĎśéß-win.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIšĹôťĘĚÁõĎśéß-win
          path: dist/*.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
